apiVersion: v1
kind: Service
metadata:
  name: llm-inference-service
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: llm-inference
    app.kubernetes.io/component: server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: llm-inference
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
# NodePort service for minikube access
apiVersion: v1
kind: Service
metadata:
  name: llm-inference-nodeport
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: llm-inference
    app.kubernetes.io/component: server
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: llm-inference
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-inference-ingress
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: llm-inference
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Enable for SSL
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: llm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-inference-service
                port:
                  number: 80
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - llm.local
  #     secretName: llm-inference-tls
