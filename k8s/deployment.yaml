apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-inference
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: llm-inference
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-inference
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-inference
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: llm-inference
      terminationGracePeriodSeconds: 60

      # Init container to wait for Redis
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service.llm-inference.svc.cluster.local 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
          resources:
            limits:
              cpu: "100m"
              memory: "64Mi"
            requests:
              cpu: "50m"
              memory: "32Mi"

      containers:
        - name: llm-inference
          image: llm-inference-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: llm-inference-config
            - secretRef:
                name: llm-inference-secrets

          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              # Uncomment for GPU support
              # nvidia.com/gpu: "1"
            limits:
              cpu: "2000m"
              memory: "8Gi"
              # nvidia.com/gpu: "1"

          # Liveness probe - is the container alive?
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - is the container ready to serve traffic?
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup probe - for slow-starting containers (model loading)
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30  # 5 minutes max startup time

          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: tmp
              mountPath: /tmp

          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: false

      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi

      # Node affinity for GPU nodes (optional)
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: nvidia.com/gpu
      #               operator: Exists

      # Tolerations for GPU nodes (optional)
      # tolerations:
      #   - key: "nvidia.com/gpu"
      #     operator: "Exists"
      #     effect: "NoSchedule"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-inference
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: llm-inference
