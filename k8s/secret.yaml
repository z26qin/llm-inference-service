apiVersion: v1
kind: Secret
metadata:
  name: llm-inference-secrets
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: llm-inference
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # HuggingFace token (required for gated models like Llama 2)
  # Replace with your actual token or leave empty for public models
  HF_TOKEN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Redis password (optional, set if using authenticated Redis)
  REDIS_PASSWORD: ""
