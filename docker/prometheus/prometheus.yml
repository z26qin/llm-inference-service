# Prometheus Configuration for LLM Inference Service
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting (optional)
alerting:
  alertmanagers: []

# Rules (optional)
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # LLM Inference Service
  - job_name: 'llm-inference'
    static_configs:
      - targets: ['llm:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis (optional - requires redis_exporter)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
